name: release
# Pushing a tag v* publishes all ZeroDep packages to nuget.org via Trusted Publishing
# (OIDC — no stored API key):
#   git tag v1.0.0 && git push origin v1.0.0
#
# One-time setup on nuget.org (Account → Trusted Publishing):
#   Repository Owner: Nerttiyana-Technologies
#   Repository:       ZeroDep
#   Workflow File:    release.yml
#   Environment:      (leave empty)
# And a repo secret NUGET_USER = your nuget.org profile name (NOT your email).
on:
  push:
    tags: ["v*"]
jobs:
  nuget:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # OIDC token for NuGet Trusted Publishing (no stored API key)
      contents: write   # create the GitHub Release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Derive version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      # Release gate: the docs must already describe this version before we publish it.
      # Hard-fails on a missing/undated CHANGELOG entry; warns if the README roadmap is not updated.
      - name: Verify docs match the release version
        run: |
          set -euo pipefail
          V="${VERSION//./\\.}"

          entry="$(grep -E "^## ${V}([^0-9]|$)" CHANGELOG.md | head -1 || true)"
          if [ -z "$entry" ]; then
            echo "::error::CHANGELOG.md has no '## ${VERSION}' section. Add a dated entry before tagging."
            exit 1
          fi
          if echo "$entry" | grep -qi "unreleased"; then
            echo "::error::CHANGELOG.md entry for ${VERSION} is still 'Unreleased'. Set its release date (## ${VERSION} — $(date +%Y-%m-%d))."
            exit 1
          fi
          if ! echo "$entry" | grep -qE "[0-9]{4}-[0-9]{2}-[0-9]{2}"; then
            echo "::error::CHANGELOG.md entry for ${VERSION} has no release date (expected '## ${VERSION} — YYYY-MM-DD')."
            exit 1
          fi
          echo "CHANGELOG ok: ${entry}"

          roadmap="$(grep -E "\*\*${V}\*\*" README.md || true)"
          if [ -n "$roadmap" ] && echo "$roadmap" | grep -qiE "in progress|planned"; then
            echo "::warning::README roadmap row for ${VERSION} is not marked 'Released': ${roadmap}"
          fi

      - name: Build
        run: dotnet build ZeroDep.slnx -c Release -p:Version="$VERSION"

      - name: Test
        run: dotnet test ZeroDep.slnx -c Release --no-build

      - name: Pack
        run: dotnet pack ZeroDep.slnx -c Release --no-build -p:Version="$VERSION" -o artifacts

      # Trusted Publishing: exchange the GitHub OIDC token for a short-lived nuget.org key.
      # Run immediately before push — the key is valid for 1 hour.
      - name: NuGet login (OIDC → short-lived key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to nuget.org
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --api-key "${{ steps.login.outputs.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/*.nupkg

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${GITHUB_REF_NAME}"
          --title "ZeroDep ${VERSION}"
          --notes "See the ${VERSION} entry in CHANGELOG.md."
