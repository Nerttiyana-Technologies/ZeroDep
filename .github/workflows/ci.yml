name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.300

      - name: Restore
        run: dotnet restore ZeroDep.slnx

      - name: Build
        run: dotnet build ZeroDep.slnx -c Release --no-restore

      - name: Test
        run: dotnet test ZeroDep.slnx -c Release --no-build --verbosity normal
